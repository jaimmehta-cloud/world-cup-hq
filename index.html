<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>World Cup HQ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
<h1>⚽ World Cup HQ</h1>
<nav>
<button data-screen="home">Home</button>
<button data-screen="bracket">Bracket</button>
<button data-screen="live">Live</button>
</nav>

<section id="home" class="screen active">
<h2>Home</h2>
<p>Welcome back!</p>
</section>

<section id="bracket" class="screen">
<h2>Bracket</h2>
<div id="bracket-container">Loading…</div>
</section>

<section id="live" class="screen">
<h2>Live Scores</h2>
<p id="live-connection">Connecting…</p>
<div id="live-matches"></div>
</section>
</div>
<script src="live-updates.js"></script>
</body>
</html>
